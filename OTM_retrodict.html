<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOT-MATRIX DICTIONARY - V3.9</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');

        :root {
            --lcd-bg: #9eb5a3; 
            --lcd-text: #2b332c;
            --lcd-border: #4a544d;
            --body-bg: #e0e0e0;
            --ui-text: #333333;
            --font-size-val: 1.1rem;
        }

        body {
            background-color: var(--body-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'DotGothic16', sans-serif;
            color: var(--ui-text);
            box-sizing: border-box;
        }

        .device-body {
            background-color: #c0c0c0;
            padding: 25px;
            border-radius: 15px;
            box-shadow: inset -4px -4px 10px #777, inset 4px 4px 10px #fff, 10px 10px 20px rgba(0,0,0,0.2);
            /* 横幅の修正：余分なスクロールバーを防ぐ */
            width: calc(100% - 40px);
            max-width: 700px;
            box-sizing: border-box;
        }

        :fullscreen {
            background-color: var(--lcd-bg);
        }
        :fullscreen .device-body {
            width: 100vw;
            max-width: none;
            height: 100vh;
            border-radius: 0;
            padding: 0;
            box-shadow: none;
            background-color: transparent;
        }
        :fullscreen #screen-outer {
            border: none;
            height: 100vh;
        }

        :-webkit-full-screen {
            background-color: var(--lcd-bg);
        }
        :-webkit-full-screen .device-body {
            width: 100vw;
            max-width: none;
            height: 100vh;
            border-radius: 0;
            padding: 0;
            box-shadow: none;
            background-color: transparent;
        }
        :-webkit-full-screen #screen-outer {
            border: none;
            height: 100vh;
        }

        #screen-outer {
            background-color: var(--lcd-bg);
            border: 8px solid var(--lcd-border);
            height: 520px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 5px 5px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        #screen-outer.dragover { background-color: #b1ccb7; }

        .lcd-scanline::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.06) 50%, transparent 50%);
            background-size: 100% 2px;
            pointer-events: none;
            z-index: 100;
        }

        .top-nav {
            display: flex;
            flex-wrap: wrap;
            border-bottom: 2px solid var(--lcd-text);
            padding: 5px;
            font-size: 0.9rem;
            justify-content: space-between;
            align-items: flex-start;
            gap: 5px;
            background: rgba(0,0,0,0.03);
            z-index: 101;
        }

        .menu-items { 
            display: flex; 
            flex-wrap: wrap;
            gap: 5px; 
            flex: 1;
        }

        .menu-item, .menu-close { 
            padding: 2px 8px; 
            border: 1px solid var(--lcd-text); 
            cursor: pointer; 
            white-space: nowrap;
            background: transparent;
        }

        .menu-item.active { background-color: var(--lcd-text); color: var(--lcd-bg); }
        .menu-close { color: #800; font-weight: bold; }

        .status-area {
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            padding-top: 2px;
        }

        #search-area { padding: 10px 15px 5px 15px; flex-shrink: 0; }
        input[type="text"] {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--lcd-text);
            color: var(--lcd-text);
            font-family: inherit;
            font-size: 1.5rem;
            outline: none;
            box-sizing: border-box;
        }

        #scroll-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px 15px;
            box-sizing: border-box;
            color: var(--lcd-text);
            font-size: var(--font-size-val);
        }

        .bottom-bar {
            width: 100%;
            border-top: 1px solid var(--lcd-text);
            padding: 3px 10px;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            background-color: var(--lcd-bg);
            box-sizing: border-box;
            flex-shrink: 0;
        }

        #history-area { margin-top: 30px; width: calc(100% - 40px); max-width: 700px; background: #f5f5f5; padding: 20px; border-radius: 8px; border: 1px solid #ccc; color: #000; box-sizing: border-box; }
        .history-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .history-item { background: #ddd; border: 1px solid #bbb; padding: 5px 12px; border-radius: 4px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .btn-del { color: #d00; cursor: pointer; border: none; background: none; font-size: 1.2rem; }
        
        .result-item { margin-bottom: 25px; border-bottom: 1px dotted var(--lcd-text); padding-bottom: 15px; }
        .word-form { font-size: 1.6em; font-weight: bold; }
        .label-box { background-color: var(--lcd-text); color: var(--lcd-bg); padding: 0 4px; margin-right: 5px; font-size: 0.8em; }
        .pronunciation-box { font-family: sans-serif; font-size: 0.9em; margin: 2px 0; color: #3a443d; }
        .phrase-block { background: rgba(0,0,0,0.05); padding: 5px; margin-top: 5px; border: 1px solid var(--lcd-text); }
        
        .settings-grid { display: grid; grid-template-columns: 100px 1fr; gap: 15px; align-items: center; padding-top: 10px; }
        .settings-grid select { font-family: 'DotGothic16'; background: transparent; border: 1px solid var(--lcd-text); color: var(--lcd-text); }

        .file-drop-area { border: 2px dashed var(--lcd-text); margin: 40px auto; padding: 40px; text-align: center; cursor: pointer; }
        #btn-fullscreen { cursor: pointer; border: 1px solid var(--lcd-text); padding: 0 5px; background: transparent; color: var(--lcd-text); font-family: inherit; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="device-body" id="device">
    <div id="screen-outer" class="lcd-scanline">
        <div class="top-nav">
            <div class="menu-items">
                <div class="menu-close" id="btn-back">× 戻る</div>
                <div class="menu-item active" data-mode="word">英和</div>
                <div class="menu-item" data-mode="example">例文検索</div>
                <div class="menu-item" data-mode="phrase">成句検索</div>
                <div class="menu-item" data-mode="trans">訳語検索</div>
                <div class="menu-item" data-mode="config">設定</div>
            </div>
            <div class="status-area">
                <button id="btn-fullscreen">全画面</button>
            </div>
        </div>

        <div id="search-area" style="display:none;">
            <input type="text" id="search-bar" placeholder="検索..." autocomplete="off">
        </div>

        <div id="scroll-content">
            <div id="initial-view">
                <div class="file-drop-area" id="drop-zone">
                    <p>OTM-JSONファイルを読み込む</p>
                    <input type="file" id="file-input" accept=".json" style="display:none;">
                </div>
            </div>
            <div id="results"></div>
        </div>

        <div class="bottom-bar">
            <span id="mode-display">MODE: 英和</span>
            <span></span>
        </div>
    </div>
</div>

<div id="history-area">
    <strong>保存済み辞書ストレージ</strong>
    <div class="history-list" id="history-list"></div>
</div>

<script>
    let dictionaryData = { words: [], examples: [], settings: {} };
    let currentMode = 'word';
    let db;
    let isFileLoaded = false;
    let filteredResults = [];
    let displayLimit = 100;

    let currentSettings = {
        fontSize: "1.1rem",
        bgMode: "#9eb5a3",
        hasDot: "lcd-scanline"
    };

    const request = indexedDB.open("DictDB", 1);
    request.onupgradeneeded = (e) => { e.target.result.createObjectStore("dictionaries", { keyPath: "name" }); };
    request.onsuccess = (e) => { db = e.target.result; loadHistory(); };

    const device = document.getElementById('device');
    const screenOuter = document.getElementById('screen-outer');
    const scrollContent = document.getElementById('scroll-content');
    const initialView = document.getElementById('initial-view');
    const searchArea = document.getElementById('search-area');
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const searchBar = document.getElementById('search-bar');
    const resultsDiv = document.getElementById('results');
    const historyList = document.getElementById('history-list');

    document.getElementById('btn-fullscreen').onclick = async () => {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            const requestFS = device.requestFullscreen || device.webkitRequestFullscreen;
            await requestFS.call(device);
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => {});
            }
        } else {
            const exitFS = document.exitFullscreen || document.webkitExitFullscreen;
            exitFS.call(document);
        }
    };

    document.getElementById('btn-back').onclick = () => { 
        isFileLoaded = false;
        initialView.style.display = 'block'; 
        searchArea.style.display = 'none'; 
        resultsDiv.innerHTML = ''; 
    };

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => screenOuter.addEventListener(e, (ev) => { ev.preventDefault(); ev.stopPropagation(); }));
    screenOuter.addEventListener('dragover', () => screenOuter.classList.add('dragover'));
    screenOuter.addEventListener('dragleave', () => screenOuter.classList.remove('dragover'));
    screenOuter.addEventListener('drop', (e) => {
        screenOuter.classList.remove('dragover');
        if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => { if(e.target.files[0]) handleFile(e.target.files[0]); };

    // スクロールイベント監視
    scrollContent.onscroll = () => {
        if (scrollContent.scrollTop + scrollContent.clientHeight >= scrollContent.scrollHeight - 50) {
            if (displayLimit < filteredResults.length) {
                displayLimit += 100;
                renderResults();
            }
        }
    };

    function handleFile(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const json = JSON.parse(e.target.result);
                db.transaction(["dictionaries"], "readwrite").objectStore("dictionaries").put({ name: file.name, data: json }).oncomplete = () => { loadHistory(); applyDict(file.name); };
            } catch(e) { alert("JSON読み込み失敗"); }
        };
        reader.readAsText(file);
    }

    function loadHistory() {
        db.transaction(["dictionaries"]).objectStore("dictionaries").getAll().onsuccess = (e) => {
            historyList.innerHTML = e.target.result.map(d => `
                <div class="history-item">
                    <span onclick="applyDict('${d.name}')" style="flex-grow:1;">${d.name}</span>
                    <button class="btn-del" onclick="event.stopPropagation(); deleteDict('${d.name}')">×</button>
                </div>
            `).join('');
        };
    }

    window.applyDict = (name) => {
        db.transaction(["dictionaries"]).objectStore("dictionaries").get(name).onsuccess = (e) => {
            dictionaryData = e.target.result.data;
            isFileLoaded = true;
            initialView.style.display = 'none';
            searchArea.style.display = 'block';
            displayLimit = 100;
            updateFilter();
        };
    };

    window.deleteDict = (name) => { if(confirm("削除しますか？")) db.transaction(["dictionaries"], "readwrite").objectStore("dictionaries").delete(name).oncomplete = loadHistory; };

    document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', () => {
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            currentMode = item.dataset.mode;
            document.getElementById('mode-display').innerText = `MODE: ${item.innerText}`;
            
            if (currentMode === 'config') {
                searchArea.style.display = 'none';
                initialView.style.display = 'none';
                renderConfig();
            } else {
                if (!isFileLoaded) {
                    initialView.style.display = 'block';
                    searchArea.style.display = 'none';
                    resultsDiv.innerHTML = '';
                } else {
                    initialView.style.display = 'none';
                    searchArea.style.display = 'block';
                    displayLimit = 100;
                    updateFilter();
                }
            }
        });
    });

    searchBar.oninput = () => {
        displayLimit = 100;
        updateFilter();
    };

    function updateSetting(key, value) {
        currentSettings[key] = value;
        if (key === 'fontSize') document.documentElement.style.setProperty('--font-size-val', value);
        if (key === 'bgMode') document.documentElement.style.setProperty('--lcd-bg', value);
        if (key === 'hasDot') document.getElementById('screen-outer').className = value;
    }

    function renderConfig() {
        resultsDiv.innerHTML = `
            <h3>システム設定</h3>
            <div class="settings-grid">
                <span>文字サイズ</span>
                <select onchange="updateSetting('fontSize', this.value)">
                    <option value="0.9rem" ${currentSettings.fontSize === '0.9rem' ? 'selected' : ''}>小</option>
                    <option value="1.1rem" ${currentSettings.fontSize === '1.1rem' ? 'selected' : ''}>中</option>
                    <option value="1.5rem" ${currentSettings.fontSize === '1.5rem' ? 'selected' : ''}>大</option>
                </select>
                <span>濃淡(背景)</span>
                <select onchange="updateSetting('bgMode', this.value)">
                    <option value="#9eb5a3" ${currentSettings.bgMode === '#9eb5a3' ? 'selected' : ''}>標準</option>
                    <option value="#b3c4b7" ${currentSettings.bgMode === '#b3c4b7' ? 'selected' : ''}>明</option>
                    <option value="#7e9684" ${currentSettings.bgMode === '#7e9684' ? 'selected' : ''}>暗</option>
                </select>
                <span>ドット表示</span>
                <select onchange="updateSetting('hasDot', this.value)">
                    <option value="lcd-scanline" ${currentSettings.hasDot === 'lcd-scanline' ? 'selected' : ''}>あり</option>
                    <option value="" ${currentSettings.hasDot === '' ? 'selected' : ''}>なし</option>
                </select>
            </div>
            <p style="margin-top:20px; font-size:0.8em;">※設定はセッション中のみ有効です。</p>
        `;
    }

    function updateFilter() {
        const q = searchBar.value.toLowerCase();
        if (!dictionaryData.words) return;

        if (currentMode === 'word' || currentMode === 'trans') {
            filteredResults = dictionaryData.words.filter(w => currentMode === 'word' ? w.entry.form.toLowerCase().includes(q) : w.translations.some(t => t.forms.some(f => f.toLowerCase().includes(q))));
        } else if (currentMode === 'example') {
            filteredResults = (dictionaryData.examples || []).filter(ex => ex.sentence.toLowerCase().includes(q) || ex.translation.toLowerCase().includes(q));
        } else if (currentMode === 'phrase') {
            filteredResults = dictionaryData.words.filter(w => w.contents.some(c => (c.title === '用法' || c.title === '成句') && (c.text.toLowerCase().includes(q) || w.entry.form.toLowerCase().includes(q))));
        }
        scrollContent.scrollTop = 0;
        renderResults();
    }

    function renderResults() {
        if (currentMode === 'config') return;
        const pronTitle = dictionaryData.settings?.zpdicOnline?.pronunciationTitle || "発音";
        const itemsToDisplay = filteredResults.slice(0, displayLimit);

        if (currentMode === 'word' || currentMode === 'trans') {
            resultsDiv.innerHTML = itemsToDisplay.map(w => {
                const pron = w.contents.find(c => c.title === pronTitle || c.title === "Pronunciation" || c.title === "発音");
                const hasValidPron = pron && pron.text && pron.text.trim() !== "";
                return `<div class="result-item"><div class="word-form">${w.entry.form}</div>${hasValidPron ? `<div class="pronunciation-box">/${pron.text}/</div>` : ''}${w.translations.map(t => `<div><span class="label-box">${t.title}</span>${t.forms.join(', ')}</div>`).join('')}${w.contents.filter(c => ![pronTitle, "Pronunciation", "発音"].includes(c.title)).map(c => `<div><strong>${c.title}</strong>: ${c.text}</div>`).join('')}</div>`;
            }).join('');
        } else if (currentMode === 'example') {
            resultsDiv.innerHTML = itemsToDisplay.map(ex => `<div class="result-item"><div style="font-weight:bold">${ex.sentence}</div><div>└ ${ex.translation}</div></div>`).join('');
        } else if (currentMode === 'phrase') {
            resultsDiv.innerHTML = itemsToDisplay.map(w => `<div class="result-item"><div class="word-form">${w.entry.form}</div>${w.contents.filter(c => c.title === '用法' || c.title === '成句').map(p => `<div class="phrase-block"><span class="label-box">${p.title}</span><div>${p.text}</div></div>`).join('')}</div>`).join('');
        }
    }
</script>
</body>
</html>
