<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPA→カタカナ変換</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/IPA_kana_converter.css">
</head>
<body>

    <div id="menu-container"></div>

    <div class="main-content">
        <div class="container">
            <h2>IPA→カタカナ変換</h2>
            <p>Geminiに作らせたものを改良した簡易的なものです</p>
            <textarea id="ipaInput" placeholder="IPA記号を入力してください"></textarea>
            <button onclick="processIPA()">変換</button>

            <div class="option-area">
                <input type="checkbox" id="smallConsonant" onchange="processIPA(true)">
                <label for="smallConsonant">子音のみの場合に文字を小さく表示する</label>
            </div>

            <div id="resultArea" style="display:none;">
                <div class="kana-display" id="kanaOutput"></div>
                <table>
                    <thead>
                        <tr>
                            <th>記号</th>
                            <th>発音の解説</th>
                        </tr>
                    </thead>
                    <tbody id="explanationBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="./js/common-menu.js"></script>
    <script src="./js/script.js"></script>
</body>
</html>
