            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            box-sizing: border-box; 
            /* IPA表示に強いフォントを優先指定 */
            font-family: "Charis SIL", "Doulos SIL", "Gentium Plus", "Lucida Sans Unicode", "Segoe UI Symbol", "Arial Unicode MS", serif;
        }

            font-weight: bold; 
            color: #d63384; 
            font-size: 1.4rem; 
            /* こちらもIPA向けフォントを適用 */
            font-family: "Charis SIL", "Doulos SIL", "Gentium Plus", "Lucida Sans Unicode", "Segoe UI Symbol", "Arial Unicode MS", serif;
            background-color: #fff0f6;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .container { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 80px; font-size: 20px; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { margin-top: 15px; width: 100%; padding: 15px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #resultArea { margin-top: 30px; }
        .kana-display { font-size: 2.5rem; font-weight: bold; color: #007bff; text-align: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }

        .ipa-input-org { background:#e9ecef; color:#007bff; }

        .small-char {

        }

        .option-area {
            margin: 10px 0;
            padding: 10px;
            background: #f0f4f8;
            border-radius: 6px;
        }
    </style>

// トークナイズ処理（IPA辞書のキーが長い順にマッチングさせる）
function tokenizeIPA(str) {
    let tokens = [];
    let i = 0;
    const sortedIpaKeys = Object.keys(ipaToJpMap).sort((a, b) => b.length - a.length);

    while (i < str.length) {
        let match = null;
        for (let key of sortedIpaKeys) {
            if (str.substr(i, key.length) === key) {
                match = key;
                break;
            }
        }
        if (match) {
            tokens.push(match);
            i += match.length;
        } else {
            // ここで空白や未定義文字が1文字ずつ入る
            tokens.push(str[i]);
            i++;
        }
    }
    return tokens;
}

function processIPA(isAuto = false) {
    const rawInput = document.getElementById('ipaInput').value;
    const resultArea = document.getElementById('resultArea');

    // チェックボックスからの自動更新(isAuto=true)かつ、入力が空または一度も変換していない場合は何もしない
    if (isAuto && (rawInput.trim() === "" || resultArea.style.display === "none")) {
        return;
    }

    let normalizedInput = rawInput;

    const sortedIpaKeys = Object.keys(ipaToJpMap).sort((a, b) => b.length - a.length);

    // --- STEP 0: 表記の正規化 ---
    const normKeys = Object.keys(ipaNormalizeMap).sort((a, b) => b.length - a.length);
    normKeys.forEach(key => {
        normalizedInput = normalizedInput.split(key).join(ipaNormalizeMap[key]);
    });

    // --- 追加：内部変換用の変数を分離 ---
    let processingInput = normalizedInput;

    // --- STEP 0.5: 子音 + ː を子音重ねに置換 (t͡sː -> t͡st͡s 等) ---
    const consonantsOnly = "pbtdʈɖcɟkɡqɢʡʔmɱnŋɲɳɴʙrʀⱱɾɽɸβfvθðszʃʒʂʐçʝxɣχʁħʕhɦɬɮʋɹɻjɰlɭʎʟwɥʍɕʑɓɗʄɠʛᶑt͡sd͡zt͡ʃd͡ʒt͡ɕd͡ʑt͡ɬd͡ɮ";

    for (const key of sortedIpaKeys) {
        // keyが子音リストに含まれている場合のみ、重ね処理を行う
        if (consonantsOnly.includes(key)) {
            const target = key + "ː";
            if (processingInput.includes(target)) {
                processingInput = processingInput.split(target).join(key + key);
            }
        }
    }

    // --- STEP 1: 中間音素へ変換（知らない文字をスキップしつつ改行は保持） ---
    let intermediate = "";
    let tempInput = processingInput; // 内部変換用を使用

    while (tempInput.length > 0) {
        let matched = false;

        // 改行はスキップせず保持
        if (tempInput.startsWith("\n")) {
            intermediate += "\n";
            tempInput = tempInput.slice(1);
            continue;
        }

        // 【追加】空白（半角・全角）を全角スペースとして保持
        if (tempInput.startsWith(" ") || tempInput.startsWith("　")) {
            intermediate += "　"; 
            tempInput = tempInput.slice(1);
            continue;
        }

        for (const key of sortedIpaKeys) {
            if (tempInput.startsWith(key)) {
                let val = ipaToJpMap[key];
                intermediate += val;
                tempInput = tempInput.slice(key.length);
                matched = true;
                break;
            }
        }
        
        if (!matched) {
            // 知らない文字は "" として扱う（スキップ）
            tempInput = tempInput.slice(1);
        }
    }

    // --- STEP 1.5: 子音が連続する場合、前の方を「ッ」に置換 ---
    // n, m以外の子音が次に続くなら、今の文字を「ッ」にする
    let fastIntermediate = "";
    const cons = "bcdfghjklpqrstvwxyzʦʣʧʃj";

    // 同一とみなすペアの正規表現置換（長いものから順に）
    // 例: tʦ → ʦʦ, tʧ → ʧʧ, dʣ → ʣ高度, zj → jj, sʃ → ʃʃ
    let normalized = intermediate
        .replace(/tʦ/g, "ʦʦ")
        .replace(/tʧ/g, "ʧʧ")
        .replace(/dʣ/g, "ʣʣ")
        .replace(/zj/g, "jj")
        .replace(/sʃ/g, "ʃʃ");

    for (let j = 0; j < intermediate.length; j++) {
        let curr = normalized[j];
        let next = normalized[j+1];
        if (next && curr === next && cons.includes(next) && cons.includes(curr) && curr !== "n" && curr !== "m" && curr !== "w" && curr !== "y") {
            fastIntermediate += "ッ";
        } else if (next && curr === next && cons.includes(next) && cons.includes(curr) && (curr === "w" || curr === "y")) {
            fastIntermediate += "";
        } else {
            fastIntermediate += curr;
        }
    }
    intermediate = fastIntermediate;

    // --- STEP 2: カタカナ変換 ---

    let i = 0;
    const vowels = "aiueo";
    let lastChar = ""; // 直前の文字を保持
    const isSmallConsonant = document.getElementById('smallConsonant').checked;
    const singleConsonants = ["k", "g", "s", "z", "t", "d", "n", "h", "f", "b", "p", "m", "y", "r", "l", "v", "w", "th", "dh", "ʃ", "ʧ", "j", "ʦ", "ʣ", "ny", "ŋ"];

    while (i < intermediate.length) {
        let curr = intermediate[i];
        let next = intermediate[i + 1];

        // 特殊記号の処理
        if (curr === " ") { finalKana += "　"; i++; continue; }
        if (curr === "ー") { finalKana += "ー"; i++; continue; }
        if (curr === "ッ") { finalKana += "ッ"; i++; continue; }

        // 1. 鼻音（mb/mp）の処理
        if (curr === "m" && (next === "m" || next === "b" || next === "p")) {
            finalKana += "ン";
            i++;
            continue; 
        }

        // 2. 最大4文字のマッチング（tsaなどの外来語、サス/アツァス判定の核）
        let match = null;
        let matchedLen = 0;
        let matchedKey = "";
        for (let len = 4; len >= 1; len--) {
            let chunk = intermediate.substr(i, len);
            if (jpToKana[chunk]) {
                match = jpToKana[chunk];
                matchedLen = len;
                matchedKey = chunk;
                break;
            }
        }

        if (match) {
            let res = match;

            // サイズ変更の判定
            if (isSmallConsonant && singleConsonants.includes(matchedKey)) {
                finalKana += `<span class="small-char">${match}</span>`;
            } else {
                finalKana += match;
            }
            i += matchedLen;
        } else {
            // --- フォールバック処理（マッチしなかった場合） ---
            if (jpToKana[curr]) {
                finalKana += jpToKana[curr];
                i++;
            } else {
                finalKana += curr;
                i++;
            }
        }
    }
    // 最後に innerHTML で出力（spanタグを有効にするため）
    document.getElementById('kanaOutput').innerHTML = finalKana;

    // --- STEP 3: 解説表示 (省略せず既存のロジックを使用してください) ---
    //document.getElementById('kanaOutput').innerText = finalKana;
    // ...以下、解説表示の処理...
    displayExplanation(normalizedInput, sortedIpaKeys); 
}

// --- 追加：サニタイズ用の関数 ---
function escapeHTML(str) {
    if (!str) return "";
    return str.replace(/[&<>"']/g, function(m) {
        return {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        }[m];
    });
}

function displayExplanation(normalizedInput, sortedIpaKeys) {
    const resultArea = document.getElementById('explanationBody');
    resultArea.innerHTML = ""; 
    
    const lines = normalizedInput.split('\n');

    lines.forEach((line) => {
        if (line.trim() === "") return; 

        // 入力行をエスケープして表示
        let safeLine = escapeHTML(line);
        let tableRows = `<tr><th colspan="2" class="ipa-input-org">${safeLine}</th></tr>`;
        
        let tempStr = line;
        while (tempStr.length > 0) {
            let found = false;
            for (let key of sortedIpaKeys) {
                if (tempStr.startsWith(key)) {
                    if (!/\s/.test(key)) {
                        let desc = ipaDesc[key] || "解説なし";
                        // keyとdescをエスケープして結合
                        tableRows += `
                            <tr>
                                <td class="ipa-sym">${escapeHTML(key)}</td>
                                <td><div>${escapeHTML(desc)}</div></td>
                            </tr>`;
                    }
                    tempStr = tempStr.slice(key.length);
                    found = true;
                    break;
                }
            }
            if (!found) {
                let unknownChar = tempStr[0];
                if (!/\s/.test(unknownChar)) {
                    tableRows += `
                        <tr>
                            <td class="ipa-sym">${escapeHTML(unknownChar)}</td>
                            <td><div>未定義の記号</div></td>
                        </tr>`;
                }
                tempStr = tempStr.slice(1);
            }
        }
        resultArea.innerHTML += tableRows;
    });

    document.getElementById('resultArea').style.display = "block";
}
